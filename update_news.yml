name: Weekly News Scraper

on:
  schedule:
    # Führt das Script jeden Freitag um 16:30 Uhr UTC aus (entspricht 18:30 Uhr Schweiz/Deutschland)
    # Das "Bild der Woche" wird freitags ab 18:00 Uhr veröffentlicht
    - cron: '30 16 * * 5'
  workflow_dispatch: # Erlaubt den manuellen Start über die GitHub-Oberfläche

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig: Erlaubt dem Bot, die JSON-Datei direkt ins Repository zu speichern

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Scraper
        # Führt deinen bestehenden Code aus. Abhängigkeiten werden nicht benötigt, da nur Standardbibliotheken verwendet wurden!
        run: python fetch_news.py

      - name: Commit and Push Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "News Scraper Bot"
          git add news_data.json
          # Verhindert Fehlermeldungen, wenn kein neuer Artikel gefunden wurde
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Neues Bild der Woche" && git push)
